name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted="$(gofmt -l . | tee /dev/stderr)"
          if [ -n "$unformatted" ]; then
            echo "gofmt found unformatted files" >&2
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...
